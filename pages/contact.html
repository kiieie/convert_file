                <h1 class="modern-content__title">고객 문의 (Contact Us)</h1>
                <p class="modern-content__desc">오작동 버그 제보나 추가 제안 기능이 있으시면 아래 폼을 접수해 주십시오.</p>
            </header>

            <div class="modern-card" style="max-width: 600px;">
                <form id="contact-form" style="display:flex; flex-direction:column; gap:16px;">
                    <div class="modern-form-group">
                        <label class="modern-label" for="contact-name">작성자 성함</label>
                        <input type="text" class="modern-input" id="contact-name" name="name" required placeholder="홍길동">
                    </div>

                    <div class="modern-form-group">
                        <label class="modern-label" for="contact-email">회신 이메일 주소</label>
                        <input type="email" class="modern-input" id="contact-email" name="email" required placeholder="user@example.com">
                    </div>

                    <div class="modern-form-group">
                        <label class="modern-label" for="contact-message">건의 및 문의 상세 내용</label>
                        <textarea class="modern-input" id="contact-message" name="message" required rows="6" placeholder="발생한 에러 현상이나 추가 요구사항 등을 적어주십시오." style="resize:vertical; font-family:inherit; font-size:13px;"></textarea>
                    </div>

                    <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:8px;">
                        <button type="button" class="modern-btn modern-btn--outline" onclick="location.href='/'">취소</button>
                        <button type="submit" class="modern-btn modern-btn--primary">📧 메일 전송하기</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- UI 컴포넌트 모달 팝업 연동 -->
    <script src="/js/core/ui-components.js?v=3"></script>
    <script>
        const form = document.getElementById('contact-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('contact-name').value;
            const email = document.getElementById('contact-email').value;
            const message = document.getElementById('contact-message').value;
            
            const subject = encodeURIComponent(`[ConvertFile 문의] ${name}님의 건의사항`);
            const body = encodeURIComponent(`이름: ${name}\n회신 이메일: ${email}\n\n내용:\n${message}`);
            
            // mailto 전송
            window.location.href = `mailto:support@2convert.org?subject=${subject}&body=${body}`;
            
            UIComponents.showErrorDialog(
                "문의 메일 연동", 
                "로컬 이메일 프로그램이 실행되었습니다. 만약 반응이 없다면 support@2convert.org 로 직접 문의 메일을 전송해 주시기 바랍니다."
            );
        });
    </script>
